<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Inscription</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
<div class="container mt-5">
  <div class="signup-container mx-auto" style="max-width: 400px;">
    <h1 class="text-center mb-4">S'inscrire</h1>
    <form
      id="signupForm"
      (ngSubmit)="onSubmit()"
      class="needs-validation"
      [class.was-validated]="formSubmitted"
      novalidate>

      <div class="mb-3">
        <label for="username" class="form-label">Nom d'utilisateur :</label>
        <input
          type="text"
          id="username"
          formControlName="username"
          class="form-control"
          placeholder="Entrez votre nom d'utilisateur"
          required
        />
        <div ngIf="signupForm.controls['username'].invalid && formSubmitted" class="invalid-feedback">
          Le nom d'utilisateur est requis.
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe :</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="form-control"
          placeholder="Entrez votre mot de passe"
          required
        />
        <div ngIf="signupForm.controls['password'].invalid && formSubmitted" class="invalid-feedback">
          Le mot de passe est requis.
        </div>
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirmer le mot de passe :</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          class="form-control"
          placeholder="Confirmez votre mot de passe"
          required
        />
        <div ngIf="signupForm.errors?.passwordMismatch && formSubmitted" class="invalid-feedback">
          Les mots de passe ne correspondent pas.
        </div>
      </div>

      <div class="mb-3">
        <label for="role" class="form-label">Rôle :</label>
        <select
          id="role"
          formControlName="role"
          class="form-control"
          required
        >
          <option value="">-- Sélectionnez votre rôle --</option>
          <option value="visiteur">Salarié</option>
          <option value="comptable">Comptable</option>
        </select>
        <div ngIf="signupForm.controls['role'].invalid && formSubmitted" class="invalid-feedback">
          Veuillez sélectionner un rôle.
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary w-100">S'inscrire</button>
      <p class="text-center mt-3">
        Vous avez déjà un compte ? <br />
        <a routerLink="/connexion">Connectez-vous</a>
      </p>
    </form>
  </div>
</div>

</body>
</html>
