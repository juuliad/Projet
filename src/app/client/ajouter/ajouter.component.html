<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une note de frais</title>
</head>
<body>

  <nav>
    <ul>
        <li><a routerLink="/accueil">Accueil</a></li>
        <li><a routerLink="/connexion">Se connecter</a></li>
        <li><a routerLink="/inscription">S'inscrire</a></li>
        <li><a routerLink="/ajouter">Ajouter une note de frais</a></li>
        <li><a routerLink="/consulter">Mes notes de frais</a></li>
    </ul>
</nav>

<h1>Ajouter une note de frais</h1>

<form [formGroup]="fraisForm" (ngSubmit)="onSubmit()">
    <label for="libelle">Libellé :</label>
    <input id="libelle" formControlName="libelle" required><br>

    <label for="montant">Montant :</label>
    <input id="montant" formControlName="montant" type="number" required><br>

    <label for="date">Date :</label>
    <input id="date" formControlName="date" type="date" required><br>

    <button type="submit" [disabled]="fraisForm.invalid">Ajouter</button>
</form>


<script>
    document.getElementById('fraisForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const libelle = document.getElementById('libelle').value;
        const montant = document.getElementById('montant').value;
        const date = document.getElementById('date').value;

        const noteDeFrais = {
            libelle: libelle,
            montant: parseFloat(montant),
            date: date
        };

        console.log('Nouvelle note de frais ajoutée:', noteDeFrais);

        alert(`La note de frais "${libelle}" de ${montant}€ a été ajoutée avec succès !`);

        document.getElementById('fraisForm').reset();
    });
</script>

</body>
</html>
